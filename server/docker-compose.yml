version: "3.8"

services:
  postgres:
    image: postgres:16
    container_name: brevly-db
    restart: always
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: docker
      POSTGRES_PASSWORD: docker
      POSTGRES_DB: brevly
    volumes:
      - pgdata:/data/postgres

volumes:
  pgdata: